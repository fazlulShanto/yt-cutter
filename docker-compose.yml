version: '3.8'

services:
  yt-cutter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-cutter-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # MongoDB connection string (required)
      # Example: mongodb://localhost:27017/yt-cutter or mongodb+srv://user:pass@cluster.mongodb.net/yt-cutter
      - MONGO_DB_URI=${MONGO_DB_URI}
      # Admin key for accessing the admin panel (required)
      - ADMIN_KEY=${ADMIN_KEY}
    env_file:
      - .env
    volumes:
      # Mount out_dir for persistent storage (optional)
      - ./out_dir:/app/out_dir
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
