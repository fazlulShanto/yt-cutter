version: '3.8'

services:
  yt-cutter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-cutter-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      # Mount out_dir for persistent storage (optional)
      - ./out_dir:/app/out_dir
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
